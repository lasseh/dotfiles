# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json
notARepository: skip
promptToReturnFromSubprocess: false
confirmOnQuit: false
gui:
  nerdFontsVersion: "3"
  showIcons: true
  showFileTree: true
  scrollHeight: 2
  scrollPastBottom: true
  mouseEvents: true
  skipDiscardChangeWarning: false
  skipStashWarning: true
  sidePanelWidth: 0.3333
  expandFocusedSidePanel: false
  enlargedSideViewLocation: top
  mainPanelSplitMode: flexible
  # Tokyo Night (Night) — from folke/tokyonight.nvim
  theme:
    activeBorderColor:
      - "#ff9e64"
      - bold
    inactiveBorderColor:
      - "#27a1b9"
    searchingActiveBorderColor:
      - "#ff9e64"
      - bold
    optionsTextColor:
      - "#7aa2f7"
    selectedLineBgColor:
      - "#283457"
    inactiveViewSelectedLineBgColor:
      - bold
    cherryPickedCommitFgColor:
      - "#7aa2f7"
    cherryPickedCommitBgColor:
      - "#bb9af7"
    markedBaseCommitFgColor:
      - "#7aa2f7"
    markedBaseCommitBgColor:
      - "#e0af68"
    unstagedChangesColor:
      - "#db4b4b"
    defaultFgColor:
      - "#c0caf5"
  commitLength:
    show: true
  skipNoStagedFilesWarning: false
  spinner:
    frames:
      - "⣷ "
      - "⣯ "
      - "⣟ "
      - "⡿ "
      - "⢿ "
      - "⣻ "
      - "⣽ "
      - "⣾ "
    rate: 100
  statusPanelView: allBranchesLog
  commandLogSize: 1
  showRandomTip: false
os:
  editPreset: "nvim"
git:
  log:
    showGraph: always
    showWholeGraph: false
  branchLogCmd: >-
    git log --color=always --graph --date=relative
    --pretty=format:'%C(dim yellow)%h %C(reset)%<|(70,trunc)%s %C(dim white)@%an%C(reset) %C(dim white)(%cd)%C(reset)%C(auto)'
  allBranchesLogCmds:
    - >-
      git log --color=always --graph --all --date=relative
      --pretty=format:'%C(auto)%h %C(reset)%<|(50,trunc)%s %C(bold blue)<%an>%C(reset) %C(green)(%cd)%C(reset)%C(auto)%d'
  overrideGpg: true
  autoFetch: true
  autoRefresh: true
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never
  skipHookPrefix: WIP
  mainBranches:
    - master
    - main
customCommands:
  - key: "R"
    command: "gh repo view --web"
    description: "view repo on GitHub"
    context: "global"
    loadingText: "opening GitHub..."
  - key: "o"
    command: "gh pr view --web"
    description: "view PR on GitHub"
    context: "global"
    loadingText: "opening GitHub..."
  - key: "o"
    command: "gh pr view --web {{ .SelectedLocalBranch.Name }}"
    description: "view branch PR on GitHub"
    context: "localBranches"
    loadingText: "opening GitHub..."
  - key: "O"
    command: >-
      gh pr create
      -t "{{index .PromptResponses 0}}"
      {{ if eq (index .PromptResponses 1) "yes"}}--draft{{ end }}
    description: "create PR via GitHub CLI"
    context: "localBranches"
    prompts:
      - type: "input"
        title: "Title"
        initialValue: "{{.CheckedOutBranch.Name}}"
      - type: "menu"
        title: "Mark pull request as draft?"
        options:
          - value: "yes"
          - value: "no"
    output: terminal
  - key: "F"
    command: "git push --force-with-lease"
    description: "force push with lease"
    context: "localBranches"
