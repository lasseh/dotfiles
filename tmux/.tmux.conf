# Terminal type configuration
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",xterm-ghostty:Tc"
# Undercurl and colored underline support (for nvim diagnostics, etc.)
set -ga terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -ga terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Change the default prefix key to C-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Update environment variables on session attach (fixes SSH agent after reconnect)
set -g update-environment "DISPLAY SSH_ASKPASS SSH_AGENT_PID SSH_AUTH_SOCK SSH_CONNECTION WINDOWID XAUTHORITY"

# Alt a/d to move between window
bind-key -n M-d next-window
bind-key -n M-a previous-window

# Kill window with prefix + K
bind K kill-window

# reload tmux.conf
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Split panes
unbind %
bind | split-window -h
unbind '"'
bind - split-window -v

# Mouse support (tmux 3.x handles drag/scroll/resize/pane-select natively)
set -g mouse on

# Copy to system clipboard on mouse drag release
# Uses pbcopy on macOS, xclip on Linux
if-shell "uname | grep -q Darwin" \
  'bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"'

# Enable activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# Set window and pane index to 1 (0 by default)
set-option -g base-index 1
# setw -g pane-base-index 1  # disabled: breaks Claude Code teammate tmux mode (issue #23527)

# Automatically renumber tmux windows
set -g renumber-windows on

# Allow programs to change window title
set -g set-titles on
set -g set-titles-string '#T'
setw -g allow-rename off
setw -g automatic-rename on
setw -g automatic-rename-format '#{b:pane_current_path}'

# Pass through escape sequences for title setting
set -ga terminal-overrides ',xterm*:XT:Ms=\E]52;%p1%s;%p2%s\007'
set -ga terminal-overrides ',tmux*:XT'

# Make delay shorter (but not 0, or arrow keys won't work!)
# Setting to 10ms is fast enough for vim while allowing escape sequences to complete
set -sg escape-time 10

# Tile all windows
unbind =
bind = select-layout tiled

# Synchronize panes
bind C-s set-window-option synchronize-panes

# Pane movement shortcuts
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Copy mode using 'Esc'
unbind [
bind Escape copy-mode

# Start selection with 'space' and copy using 'y'
bind -T copy-mode-vi 'v' send -X begin-selection
if-shell "uname | grep -q Darwin" \
  'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"'

# Paste using 'p'
unbind p
bind p paste-buffer

# TokyoNight colors for Tmux

set -g mode-style "fg=#7aa2f7,bg=#3b4261"

set -g message-style "fg=#7aa2f7,bg=#3b4261"
set -g message-command-style "fg=#7aa2f7,bg=#3b4261"

set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

set -g status "on"
set -g status-justify "left"

set -g status-style "fg=#7aa2f7,bg=#16161e"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#15161e,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#16161e,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#16161e,bg=#16161e,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#16161e] #{prefix_highlight} #[fg=#3b4261,bg=#16161e,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#3b4261] %d.%m.%y  %H:%M #[fg=#7aa2f7,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#15161e,bg=#7aa2f7,bold] #h "


setw -g window-status-activity-style "underscore,fg=#a9b1d6,bg=#16161e"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#a9b1d6,bg=#16161e"
setw -g window-status-format "#[fg=#16161e,bg=#16161e,nobold,nounderscore,noitalics]#[default] #I  #W #[fg=#16161e,bg=#16161e,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#16161e,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#3b4261,bold] #I  #W #[fg=#3b4261,bg=#16161e,nobold,nounderscore,noitalics]"

# tmux-plugins/tmux-prefix-highlight support
set -g @prefix_highlight_output_prefix "#[fg=#e0af68]#[bg=#16161e]#[fg=#16161e]#[bg=#e0af68]"
set -g @prefix_highlight_output_suffix ""

# Set clock mode to 24-hour format
set -g clock-mode-style 24
